<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テスト</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
    font-size: 36px; /* 全体サイズUP */
  }

  .header {
    background: #333;
    color: #fff;
    padding: 12px 16px;
    font-size: 22px;
    font-weight: bold;
  }

  .row {
    display: grid;
    grid-template-columns: 100px 110px 130px 1fr 70px 1fr;
    align-items: center;
    padding: 18px;
    border-bottom: 1px solid #ddd;
    background: #fff;
  }

  .type {
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    font-weight: bold;
    font-size: 18px;
  }

  .local {
    background: #e0e0e0;
  }

  .test {
    background: #ffff00;
  }
  
  .ohoku {
    background: #7777ff;
  }

  .express {
    background: #c62828;
    color: #fff;
  }

  .cars, .platform {
    font-size: 26px;
    text-align: center;
    font-weight: bold;
  }

  .time {
    font-size: 34px; /* 目立たせる */
    font-weight: bold;
  }

  .delay {
    color: red;
    font-size: 16px;
  }

  .destination {
    font-size: 26px;
    font-weight: bold;
  }

  .limited {
    color: #c62828;
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<div class="header"></div>

 
<div class="row">
  <div class="type local">普通</div>
  <div class="cars">3/28</div>
  <div class="time">20:53</div>
    <div class="delay">遅れ見込み</div>
    <div class="limited">お茶の間91号</div>
  <div>
    <div class="destination">雑談</div>
  </div>
  <div class="platform">vc 2</div>
</div>
  

</body>
</html>
