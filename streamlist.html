<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テスト</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
    font-size: 36px; /* 全体サイズUP */
  }

  .header {
    background: #333;
    color: #fff;
    padding: 12px 16px;
    font-size: 22px;
    font-weight: bold;
  }

  .row {
    display: grid;
    grid-template-columns: 100px 110px 130px 1fr 70px;
    align-items: center;
    padding: 18px;
    border-bottom: 1px solid #ddd;
    background: #fff;
  }

  .type {
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    font-weight: bold;
    font-size: 18px;
  }

  .local {
    background: #e0e0e0;
  }

  .test {
    background: #ffff00;
  }
  
  .ohoku {
    background: #0000ff;
  }

  .express {
    background: #c62828;
    color: #fff;
  }

  .cars, .platform {
    font-size: 26px;
    text-align: center;
    font-weight: bold;
  }

  .time {
    font-size: 34px; /* 目立たせる */
    font-weight: bold;
  }

  .delay {
    color: red;
    font-size: 16px;
  }

  .destination {
    font-size: 26px;
    font-weight: bold;
  }

  .limited {
    color: #c62828;
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<div class="header"></div>

<div class="row">
  <div class="type local">通勤北上</div>
  <div class="cars">03/14</div>
  <div>
    <div class="time">7:44</div>
    <div class="delay"></div>
  </div>
  <div class="destination">大分</div>
  <div class="platform"></div>
</div>

<div class="row">
  <div class="type ohoku">大分北上</div>
  <div class="cars">03/15</div>
  <div class="time">12:23</div>
  <div>
    <div class="limited">特発大分北上</div>
    <div class="destination">大分</div>
  </div>
  <div class="platform">1</div>
</div>

<div class="row">
  <div class="type local">通勤北上</div>
  <div class="cars">03/16</div>
  <div class="time">16:37</div>
  <div class="destination">大分（幸崎乗継）</div>
  <div class="platform"></div>
</div>

<div class="row">
  <div class="type local">通勤北上</div>
  <div class="cars">3/17</div>
  <div class="time">15:48</div>
  <div>
    <div class="limited"></div>
    <div class="destination">大分</div>
  </div>
  <div class="platform"></div>
</div>

<div class="row">
  <div class=""></div>
  <div class="cars"></div>
  <div class="time"></div>
  <div>
    <div class="limited"></div>
    <div class="destination"></div>
  </div>
  <div class="platform"></div>
</div>

</body>
</html>
